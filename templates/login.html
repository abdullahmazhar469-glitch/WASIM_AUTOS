<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WASIM AUTOS — Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0b0f; --surface: #12141a; --border: #252836; --accent: #f0c040; --text: #e8eaf0; --muted: #6b7080; --error: #e05c3a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
        .login-box { position: relative; z-index: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: all 0.2s ease; }
        .login-box:hover { border-color: var(--accent); box-shadow: 0 8px 32px rgba(240,192,64,0.15); }
        .logo { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 32px; }
        .logo-icon { width: 48px; height: 48px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; color: #0a0b0f; }
        .logo-text { font-weight: 800; font-size: 24px; letter-spacing: -0.5px; }
        .sub-text { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-align: center; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 6px; font-size: 14px; font-family: 'Inter', sans-serif; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(240,192,64,0.1); }
        button { width: 100%; background: var(--accent); color: #0a0b0f; border: none; padding: 12px; border-radius: 6px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(240,192,64,0.3); }
        .error { background: rgba(224,92,58,0.1); border: 1px solid rgba(224,92,58,0.3); color: var(--error); padding: 10px; border-radius: 6px; font-size: 12px; margin-bottom: 16px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo"><div class="logo-icon">WA</div><div><div class="logo-text">WASIM AUTOS</div><div class="sub-text">ADMIN ACCESS</div></div></div>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post">{% csrf_token %}<div class="form-group"><label>Username</label><input type="text" name="username" required autofocus></div><div class="form-group"><label>Password</label><input type="password" name="password" required></div><button type="submit">LOGIN</button></form>
    </div>
</body>
</html>
