<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - WASIM AUTOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0b0f;
            --surface: #12141a;
            --border: #252836;
            --accent: #f0c040;
            --text: #e8eaf0;
            --muted: #6b7080;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .logo-box {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text);
        }
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent) 0%, #d4a520 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 22px;
            color: #0a0b0f;
        }
        .logo-text {
            font-weight: 800;
            font-size: 24px;
        }
        .logo-text span { color: var(--accent); }
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .checkout-form, .order-summary {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0a0b0f;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .total {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid var(--border);
        }
        @media (max-width: 768px) {
            .checkout-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="{% url 'home' %}" class="logo-box">
                <div class="logo-icon">WA</div>
                <div><div class="logo-text">WASIM <span>AUTOS</span></div></div>
            </a>
        </header>

        <div class="checkout-grid">
            <div class="checkout-form">
                <h3 style="margin-bottom: 20px;">Shipping Information</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" name="name" required value="{{ user.customer.name|default:'' }}">
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="email" required value="{{ user.customer.email|default:'' }}">
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" name="phone" required value="{{ user.customer.phone|default:'' }}">
                    </div>
                    <div class="form-group">
                        <label>Delivery Address *</label>
                        <textarea name="address" rows="3" required>{{ user.customer.address|default:'' }}</textarea>
                    </div>
                    <div class="form-group">
                        <label>Payment Method</label>
                        <select name="payment_method">
                            <option value="COD">Cash on Delivery</option>
                            <option value="JazzCash">JazzCash</option>
                            <option value="EasyPaisa">EasyPaisa</option>
                            <option value="Bank">Bank Transfer</option>
                        </select>
                    </div>
                    <button type="submit">Place Order</button>
                </form>
            </div>

            <div class="order-summary">
                <h3 style="margin-bottom: 20px;">Order Summary</h3>
                {% for item in cart_items %}
                <div class="summary-item">
                    <span>{{ item.product.name }} x {{ item.quantity }}</span>
                    <span>Rs. {{ item.total_price|floatformat:2 }}</span>
                </div>
                {% endfor %}
                <div class="summary-item total">
                    <strong>Total</strong>
                    <strong>Rs. {{ total_amount|floatformat:2 }}</strong>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
